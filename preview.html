<!DOCTYPE html>
<html>
<head>
<title>Greater Shop - Gaming Coins</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#000;
  color:#fff;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 50px;
  background:#111;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

nav a{
  color:white;
  text-decoration:none;
  margin:15px;
}

.hero{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(#000,#222);
}

.hero h1{
  font-size:45px;
}

.hero button{
  margin-top:25px;
  padding:15px 35px;
  background:white;
  color:black;
  border:none;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
}

.products{
  padding:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
}

.card{
  background:#111;
  border:1px solid #333;
  padding:25px;
  text-align:center;
  border-radius:15px;
}

.card h2{
  margin-bottom:15px;
}

.price{
  font-size:22px;
  margin:15px;
}

.buy{
  background:white;
  color:black;
  padding:10px 25px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:20px;
  background:#111;
}
</style>
</head>

<body>

<header>
<div class="logo">🎮 Greater Shop</div>

<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">Cart</a>
<a href="#">Login</a>
</nav>
</header>


<section class="hero">
<h1>Buy Gaming Coins Instantly</h1>
<p>Fast & secure gaming top-ups with ₹ payment</p>
<button>Shop Now</button>
</section>


<section class="products">

<div class="card">
<h2>Free Fire Diamonds</h2>
<p>100 Diamonds</p>
<div class="price">₹99</div>
<button class="buy">Buy Now</button>
</div>

<div class="card">
<h2>BGMI UC</h2>
<p>300 UC Pack</p>
<div class="price">₹399</div>
<button class="buy">Buy Now</button>
</div>

<div class="card">
<h2>Valorant Points</h2>
<p>475 Points</p>
<div class="price">₹499</div>
<button class="buy">Buy Now</button>
</div>

<div class="card">
<h2>Steam Wallet</h2>
<p>Gift Card</p>
<div class="price">₹500</div>
<button class="buy">Buy Now</button>
</div>

</section>


<footer>
© 2026 Greater Shop | Gaming Store
</footer>

</body>
</html>
